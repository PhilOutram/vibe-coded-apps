<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumière — Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent-dim: rgba(200, 169, 110, 0.15);
      --text: #e8e0d5;
      --muted: #5a5550;
      --danger: #c06060;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    header {
      padding: 3rem 4rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .count-badge {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      border: 1px solid var(--accent);
      padding: 0.3rem 0.7rem;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .count-badge.visible { opacity: 1; }

    /* Upload Zone */
    .upload-zone {
      margin: 3rem 4rem 2rem;
      border: 1px dashed var(--border);
      border-radius: 2px;
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
      background: var(--surface);
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.25rem;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .upload-zone:hover .upload-icon,
    .upload-zone.drag-over .upload-icon { opacity: 0.9; }

    .upload-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-style: italic;
      color: var(--text);
      display: block;
      margin-bottom: 0.5rem;
    }

    .upload-sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 4rem 1.5rem;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .grid-toggle {
      display: flex;
      gap: 0.4rem;
    }

    .grid-toggle button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .grid-toggle button.active,
    .grid-toggle button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .clear-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      gap: 3px;
      padding: 0 4rem 4rem;
      grid-template-columns: repeat(4, 1fr);
      transition: grid-template-columns 0.3s;
    }

    .gallery.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .gallery.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .gallery.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .gallery.cols-6 { grid-template-columns: repeat(6, 1fr); }

    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(2, 1fr) !important; padding: 0 1.5rem 3rem; }
      header, .upload-zone, .controls { padding-left: 1.5rem; padding-right: 1.5rem; margin-left: 0; margin-right: 0; }
      .upload-zone { margin: 2rem 1.5rem 1rem; }
    }

    @media (max-width: 500px) {
      .gallery { grid-template-columns: 1fr !important; }
    }

    /* Gallery Item */
    .gallery-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--surface);
      animation: fadeIn 0.4s ease both;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
      filter: brightness(0.92) saturate(0.9);
    }

    .gallery-item:hover img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1.05);
    }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
    }

    .gallery-item:hover .overlay { opacity: 1; }

    .overlay .name {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .overlay .size {
      font-size: 0.6rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    .remove-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      font-size: 0.8rem;
      line-height: 1;
    }

    .gallery-item:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

    /* Empty state */
    .empty-state {
      display: none;
      text-align: center;
      padding: 5rem 4rem;
      color: var(--muted);
    }

    .empty-state.visible { display: block; }

    .empty-state p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--text);
      opacity: 0.4;
    }

    .empty-state span {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: lbIn 0.25s ease;
    }

    @keyframes lbIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
      animation: lbImgIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes lbImgIn {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 2rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .lightbox-close:hover { color: #fff; }

    .lightbox-caption {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Lumi<em>ère</em></h1>
      <div class="tagline">Personal Image Gallery</div>
    </div>
    <div class="count-badge" id="countBadge">0 photos</div>
  </header>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <svg class="upload-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="10" width="36" height="28" rx="2" stroke="#c8a96e" stroke-width="1.5"/>
      <circle cx="16" cy="20" r="3" stroke="#c8a96e" stroke-width="1.5"/>
      <path d="M6 32l10-10 8 8 6-6 12 14" stroke="#c8a96e" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M24 6v12M20 10l4-4 4 4" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="upload-label">Drop your images here</span>
    <span class="upload-sub">or click to browse — JPG, PNG, WEBP, GIF</span>
  </div>

  <div class="controls" id="controls" style="display:none">
    <label>Grid</label>
    <div class="grid-toggle">
      <button onclick="setGrid(2)" id="btn2">2×</button>
      <button onclick="setGrid(3)" id="btn3">3×</button>
      <button onclick="setGrid(4)" id="btn4" class="active">4×</button>
      <button onclick="setGrid(6)" id="btn6">6×</button>
    </div>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
  </div>

  <div class="gallery cols-4" id="gallery"></div>
  <div class="empty-state" id="emptyState">
    <p>Your gallery is empty.</p>
    <span>Upload images to begin</span>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightboxImg" src="" alt="" />
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const controls = document.getElementById('controls');
    const emptyState = document.getElementById('emptyState');
    const countBadge = document.getElementById('countBadge');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');

    let images = [];
    let currentGrid = 4;

    // File input
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    // Drag & drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (!imageFiles.length) return;

      imageFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = { src: e.target.result, name: file.name, size: formatSize(file.size), id: Date.now() + Math.random() };
          images.push(img);
          addTile(img);
          updateUI();
        };
        reader.readAsDataURL(file);
      });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function addTile(img) {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.dataset.id = img.id;
      item.innerHTML = `
        <img src="${img.src}" alt="${img.name}" loading="lazy" />
        <div class="overlay">
          <div class="name">${img.name}</div>
          <div class="size">${img.size}</div>
        </div>
        <button class="remove-btn" title="Remove" onclick="removeImage(${img.id}, event)">×</button>
      `;
      item.addEventListener('click', e => {
        if (e.target.classList.contains('remove-btn')) return;
        openLightbox(img);
      });
      gallery.appendChild(item);
    }

    function removeImage(id, e) {
      e.stopPropagation();
      images = images.filter(i => i.id !== id);
      const tile = gallery.querySelector(`[data-id="${id}"]`);
      if (tile) {
        tile.style.animation = 'none';
        tile.style.transition = 'opacity 0.3s, transform 0.3s';
        tile.style.opacity = '0';
        tile.style.transform = 'scale(0.9)';
        setTimeout(() => tile.remove(), 300);
      }
      updateUI();
    }

    function clearAll() {
      images = [];
      gallery.innerHTML = '';
      updateUI();
    }

    function updateUI() {
      const n = images.length;
      countBadge.textContent = n === 0 ? '0 photos' : `${n} photo${n !== 1 ? 's' : ''}`;
      countBadge.classList.toggle('visible', n > 0);
      controls.style.display = n > 0 ? 'flex' : 'none';
      emptyState.classList.toggle('visible', n === 0);
      fileInput.value = '';
    }

    function setGrid(cols) {
      currentGrid = cols;
      gallery.className = `gallery cols-${cols}`;
      document.querySelectorAll('.grid-toggle button').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn${cols}`).classList.add('active');
    }

    function openLightbox(img) {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.name;
      lightboxCaption.textContent = `${img.name} · ${img.size}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      if (e && e.target !== lightbox && !e.target.classList.contains('lightbox-close')) return;
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox({ target: lightbox });
    });

    // Initial state
    updateUI();
  </script>
</body>
</html>
